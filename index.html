<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דנה מנצור - מעצבת תכשיטים</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">דנה מנצור</a>
            <ul class="nav-links">
                <li><a href="#about">אודות</a></li>
                <li><a href="#jewelry">תכשיטים</a></li>
                <li><a href="#school">משחקים</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-background">
            <img src="Dana_Mantzur_052999638_ex1.png" alt="דנה מנצור">
        </div>
    </header>

    <section id="about" class="about">
        <div class="container">
            <div class="about-content">
                <div class="about-text">
                    <h2>אודות</h2>
                    <p class="lead">הי, אני דנה מנצור - מעצבת תכשיטים וסטודנטית לתואר שני בעיצוב משחקים.</p>
                    <p>האהבה לעיצוב מתבטאת בכל פרויקט - מתכשיטי כלה ועד חוויות אינטראקטיביות.</p>
                </div>
                <div class="about-image">
                    <img src="808A0161b.jpg" alt="דנה מנצור" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
    </section>

    <section id="school" class="works school-section">
        <div class="container">
            <h2>עבודות אקדמיות ופרויקטים</h2>
            <div class="work-grid">
                <div class="work-card">
                    <div class="work-media">
                        <img src="מצגת מכירה.pptx.jpg" alt="מצגת מכירה">
                    </div>
                </div>
                <div class="work-card">
                    <div class="work-media">
                        <img src="hand.jpeg" alt="יד">
                    </div>
                </div>
                
                <div class="work-card pdf-card">
                    <div class="pdf-viewer-wrapper">
                        <div class="pdf-canvas-container">
                            <canvas id="pdfCanvas"></canvas>
                        </div>
                    </div>
                    <div class="work-info">
                        <a href="עבודת גמר לודלוגיה - דנה מנצור.pdf" target="_blank" class="work-link">פתח עבודת גמר PDF <i class="fas fa-external-link-alt"></i></a>
                    </div>
                </div>
            </div>

            <h3 class="subsection-title" id="jewelry" style="margin-top: 60px; text-align: center;">גלריית תכשיטים</h3>
            <div class="video-grid">
                <div class="video-card"><img src="Crystal cuff bracelet.jpg" alt="צמיד קריסטלים"></div>
                <div class="video-card"><img src="Pearl back chain.jpg" alt="שרשרת גב"></div>
                <div class="video-card"><img src="Body chain.jpg" alt="שרשרת גוף"></div>
                <div class="video-card"><img src="engraved cuff bracelet.jpg" alt="צמיד חריטה"></div>
                <div class="video-card"><img src="Gold name bracelet.png" alt="צמיד שמות זהב"></div>
                <div class="video-card"><img src="White gold name bracelet.png" alt="צמיד שמות זהב לבן"></div>
                <div class="video-card"><img src="Heart necklace.jpg" alt="שרשרת לב"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>דנה מנצור &copy; 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
